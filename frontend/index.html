<!doctype html>
<html lang="sq">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Portal Biz</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Source+Serif+4:wght@600;700;800&display=swap" rel="stylesheet">

<style>

:root{
--font-body:"Inter",system-ui,sans-serif;
--font-editorial:"Source Serif 4",serif;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
}

html,
body,
#root{
min-height:100%;
}

body{
font-family:var(--font-body);
font-size:16px;
line-height:1.68;
font-weight:500;

letter-spacing:-0.01em;

background:#f8fafc;
color:#0f172a;

-webkit-font-smoothing:antialiased;
-moz-osx-font-smoothing:grayscale;
text-rendering:optimizeLegibility;
}


/* Bloomberg / Forbes style headlines */

h1{
font-family:var(--font-editorial);
font-size:clamp(44px,7vw,82px);
font-weight:800;
line-height:0.95;
letter-spacing:-0.045em;
}

h2{
font-family:var(--font-editorial);
font-weight:700;
letter-spacing:-0.035em;
line-height:1;
}

h3,h4,h5,h6{
font-family:var(--font-body);
font-weight:800;
letter-spacing:-0.03em;
}


/* Nav stays modern */
nav{
font-family:var(--font-body);
font-weight:700;
}


/* Buttons */
button{
font-family:var(--font-body);
font-weight:700;
}


/* Forms */
input,
select,
textarea{
font-family:var(--font-body);
font-size:15px;
}


a{
text-decoration:none;
color:inherit;
}

</style>

</head>

<body>
<div id="root"></div>
<script type="module" src="/src/main.jsx"></script>
</body>
</html>
